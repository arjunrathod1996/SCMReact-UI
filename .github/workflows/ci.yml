name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: arni-app

jobs:
  build-test-scan:   # ✅ MUST match GitHub required check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ArNi

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ArNi/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present || true

      - name: Run Tests
        run: npm run test --if-present

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        if: github.event_name == 'push'   # ✅ Avoid push on PR
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:$IMAGE_TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:$IMAGE_TAG

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:latest
          fi