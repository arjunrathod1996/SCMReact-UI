name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - prod

      skip_tests:
        description: "Skip Tests"
        required: false
        type: boolean
        default: false

      skip_sonar:
        description: "Skip Sonar Scan"
        required: false
        type: boolean
        default: false

      skip_quality_gate:
        description: "Skip Quality Gate"
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ArNi

    steps:
      # -----------------------
      # Checkout
      # -----------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------
      # Node Setup
      # -----------------------
      - name: Setup Node
        if: ${{ inputs.skip_tests == false }}
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -----------------------
      # Install + Test
      # -----------------------
      - name: Install Dependencies
        if: ${{ inputs.skip_tests == false }}
        run: npm ci

      - name: Run Tests
        if: ${{ inputs.skip_tests == false }}
        run: npm test --if-present

      # -----------------------
      # Sonar (optional)
      # -----------------------
      - name: Sonar Scan
        if: ${{ inputs.skip_sonar == false }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: ./ArNi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -----------------------
      # Docker Build & Push
      # -----------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:$IMAGE_TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arni-app:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # -----------------------
      # Setup kubectl
      # -----------------------
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # -----------------------
      # Deploy based on env
      # -----------------------
      - name: Deploy to DEV
        if: ${{ inputs.environment == 'dev' }}
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/arni-app arni-app=${{ secrets.DOCKERHUB_USERNAME }}/arni-app:${IMAGE_TAG} -n arni-dev

      - name: Deploy to PROD
        if: ${{ inputs.environment == 'prod' }}
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/arni-app arni-app=${{ secrets.DOCKERHUB_USERNAME }}/arni-app:${IMAGE_TAG} -n arni-prod