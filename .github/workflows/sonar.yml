name: Sonar Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  sonar:   # ✅ MUST match GitHub required check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ArNi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test --if-present

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: ./ArNi
          args: >
            -Dsonar.projectKey=arjunrathod1996_SCMReact-UI
            -Dsonar.organization=arjunrathod1996
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}