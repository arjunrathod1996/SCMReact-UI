# Certificate Signing Request configuration for homol environment
[req]
distinguished_name = req_distinguished_name
req_extensions = v3_req
prompt = no

[req_distinguished_name]
C = IN
ST = State
L = City
O = Organization
OU = Homol
CN = homol.example.com

[v3_req]
keyUsage = keyEncipherment, dataEncipherment
extendedKeyUsage = serverAuth
subjectAltName = @alt_names

[alt_names]
DNS.1 = homol.example.com
DNS.2 = staging.example.com