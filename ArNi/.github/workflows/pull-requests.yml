name: pull-request

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install npm packages
        run: npm ci

      - name: Check Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: build artifact
        run: npm run build