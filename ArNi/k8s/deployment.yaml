apiVersion: apps/v1
kind: Deployment
metadata:
  name: arni-app
  namespace: arni-dev
  labels:
    app: arni-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: arni-app

  template:
    metadata:
      labels:
        app: arni-app

    spec:
      containers:
        - name: arni-app
          image: arjun368/arni-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          volumeMounts:
            - name: config-volume
              mountPath: /usr/share/nginx/html/env.js
              subPath: env.js

      volumes:
        - name: config-volume
          configMap:
            name: arni-react-dev-cm